# Secret template for de-person-course-term-publish.
# Copy to secrets.yaml, fill in base64-encoded values, then:
#   kubectl apply -f k8s/secrets.yaml -n <namespace>
# Never commit secrets.yaml to version control.
apiVersion: v1
kind: Secret
metadata:
  name: de-person-course-term-publish-secrets
  namespace: <namespace>
type: Opaque
data:
  # PostgreSQL
  POSTGRES_HOST: <base64>
  POSTGRES_PORT: <base64>          # e.g. echo -n "5432" | base64
  POSTGRES_DB: <base64>
  POSTGRES_USER: <base64>
  POSTGRES_PASS: <base64>

  # Campus Solutions Tools API
  CS_ENV: <base64>                  # e.g. PROD or TEST
  DE_CSTOOLS_ENDPOINT: <base64>
  DE_CSTOOLS_KEY: <base64>

  # SnapLogic Course API
  SNAPLOGIC_COURSE_URL: <base64>
  SNAPLOGIC_COURSE_KEY: <base64>

  # DE Person API
  DE_PERSON_API_URL: <base64>
  DE_PERSON_API_KEY: <base64>

  # VDS API
  VDS_URL: <base64>
  VDS_KEY: <base64>

  # SAP API
  SAP_URL: <base64>
  SAP_KEY: <base64>
